<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Snowflake Learning Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet===== */
:root {
  --bg:#0d0f1a;
  --sidebar-bg:#0a0c16;
  --card-bg:#131625;
  --card-border:#1e2340;
  --accent:#29d4f5;
  --accent2:#7c6af7;
  --success:#3ddc84;
  --danger:#ff5e5e;
  --text:#e2e8f8;
  --muted:#7a82a8;
}

/* ===== RESET ===== */
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:Sora,sans-serif;
  background:var(--bg);
  color:var(--text);
  display:flex;
}

/* ===== SIDEBAR ===== */
.sidebar{
  width:260px;
  background:var(--sidebar-bg);
  padding:20px;
  height:100vh;
  position:fixed;
}
.nav-item{
  padding:8px 12px;
  border-radius:6px;
  cursor:pointer;
  color:var(--muted);
  margin-bottom:4px;
}
.nav-item:hover{background:var(--card-bg);color:var(--text)}
.nav-item.active{color:var(--accent);border-left:3px solid var(--accent)}

.category{
  margin-top:16px;
  font-size:.7rem;
  color:var(--muted);
  text-transform:uppercase;
}

/* ===== CONTENT ===== */
.content{
  margin-left:260px;
  padding:30px;
  width:100%;
}
.card{
  background:var(--card-bg);
  border:1px solid var(--card-border);
  border-radius:12px;
  padding:24px;
  margin-bottom:20px;
}

/* ===== QUIZ ===== */
.quiz-question{margin-bottom:20px}
.quiz-option{
  border:1px solid var(--card-border);
  padding:8px 12px;
  border-radius:6px;
  margin-bottom:6px;
  cursor:pointer;
}
.quiz-option.correct{border-color:var(--success);background:rgba(61,220,132,.15)}
.quiz-option.incorrect{border-color:var(--danger);background:rgba(255,94,94,.15)}
</style>
</head>

<body>

<div class="sidebar">
  <div class="category">Teoría</div>
  <div class="nav-item" onclick="showWelcome(this)">🏠 Inicio</div>

  <div class="category">Conceptos</div>
  <div class="nav-item" onclick="loadConceptQuiz('arquitectura', this)">🏗 Arquitectura</div>
  <div class="nav-item" onclick="loadConceptQuiz('warehouses', this)">⚙ Warehouses</div>
</div>

<div class="content">
  <div id="main-area"></div>
</div>

<script>
/* ======================================================
   QUIZZES – SNOWPRO STYLE
====================================================== */
const conceptQuizzes = {

  arquitectura:{
    title:"Arquitectura de Snowflake",
    description:"Evaluación de arquitectura Snowflake.",
    questions:[
      {type:"tf", q:"Snowflake separa almacenamiento y cómputo.", a:true},
      {type:"tf", q:"Las micro‑particiones se crean manualmente.", a:false},
      {
        type:"mc",
        q:"¿Cuántas capas tiene Snowflake?",
        opts:["1","2","3","4"],
        a:2
      }
    ]
  },

  warehouses:{
    title:"Virtual Warehouses",
    description:"Gestión de cómputo.",
    questions:[
      {type:"tf", q:"Un warehouse suspendido no consume créditos.", a:true},
      {
        type:"mc",
        q:"¿Cuál reduce costos?",
        opts:["AUTO_RESUME","AUTO_SUSPEND","TIME TRAVEL"],
        a:1
      }
    ]
  }
};

/* ======================================================
   HELPERS
====================================================== */
function setActive(el){
  document.querySelectorAll(".nav-item")
    .forEach(i=>i.classList.remove("active"));
  el.classList.add("active");
}

/* ======================================================
   UI
====================================================== */
function showWelcome(el){
  setActive(el);
  document.getElementById("main-area").innerHTML = `
    <div class="card">
      <h1>❄ Snowflake Learning Hub</h1>
      <p style="color:var(--muted)">
        Plataforma interactiva estilo SnowPro.
      </p>
    </div>
  `;
}

function loadConceptQuiz(id, el){
  setActive(el);
  const quiz = conceptQuizzes[id];
  let html = `
    <div class="card">
      <h2>${quiz.title}</h2>
      <p style="color:var(--muted)">${quiz.description}</p>
  `;

  quiz.questions.forEach((q,i)=>{
    html+=`<div class="quiz-question"><strong>${i+1}. ${q.q}</strong>`;

    if(q.type==="tf"){
      ["Verdadero","Falso"].forEach((o,idx)=>{
        const ok = (idx===0)===q.a;
        html+=`<div class="quiz-option"
          onclick="this.classList.add('${ok?'correct':'incorrect'}')">${o}</div>`;
      });
    }
    if(q.type==="mc"){
      q.opts.forEach((o,idx)=>{
        html+=`<div class="quiz-option"
          onclick="this.classList.add('${idx===q.a?'correct':'incorrect'}')">${o}</div>`;
      });
    }
    html+=`</div>`;
  });

  html+=`</div>`;
  document.getElementById("main-area").innerHTML = html;
}

window.onload = ()=>showWelcome(document.querySelector(".nav-item"));
</script>

</body>
</html>
