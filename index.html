let currentTopic = 'intro';
const totalTopics = Object.keys(data).length;

function load(topic, element) {
  currentTopic = topic;
  const content = data[topic];
  
  // Actualizar navegación activa
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  if (element) element.classList.add('active');
  
  // Renderizar contenido
  document.getElementById('content-area').innerHTML = `
    <div class="header">
      <span class="tag">${content.tag}</span>
      <h1>${content.title}</h1>
    </div>
    <div class="card">
      ${content.content}
      <button class="btn-next" onclick="nextTopic()">Siguiente tema →</button>
    </div>
  `;
  
  // Actualizar progreso
  const topics = Object.keys(data);
  const currentIndex = topics.indexOf(topic) + 1;
  document.getElementById('progress').style.width = (currentIndex / totalTopics * 100) + '%';
  
  // Scroll al inicio
  window.scrollTo(0, 0);
}

function nextTopic() {
  const topics = Object.keys(data);
  const currentIndex = topics.indexOf(currentTopic);
  if (currentIndex < topics.length - 1) {
    const nextTopic = topics[currentIndex + 1];
    const nextElement = document.querySelector(`[onclick="load('${nextTopic}', this)"]`);
    load(nextTopic, nextElement);
  }
}

function searchTopics(query) {
  const items = document.querySelectorAll('.nav-item');
  query = query.toLowerCase();
  
  items.forEach(item => {
    const text = item.textContent.toLowerCase();
    item.style.display = text.includes(query) ? 'flex' : 'none';
  });
}
