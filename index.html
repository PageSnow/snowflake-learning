    .category {

    .header h1 {

    .tag {

      overflow-x: auto;
      font-family: 'Courier New', monospace;
      font-size: 0.9rem;
      line-height: 1.5;
      margin: 15px 0;
      position: relative;

      right: 10px;
      font-size: 0.75rem;
      color: #666;

      margin-bottom: 30px;
      overflow: hidden;
    }

      align-items: center;
      margin-bottom: 25px;
      padding-bottom: 15px;
      border-bottom: 2px solid #eee;

    .quiz-progress {

      color: #ff6b6b;

      margin-bottom: 20px;
      color: #1a1a2e;

      margin-bottom: 25px;
    }

      align-items: center;
      gap: 12px;
    }

      border-color: #00d4ff;
      background: #f0f9ff;
      transform: translateX(5px);
    }
    
    .option.selected {
      border-color: #00d4ff;
      background: #e3f2fd;
    }
    
    .option.correct {
      border-color: #4caf50;
      background: #e8f5e9;
    }
    
    .option.incorrect {
      border-color: #f44336;
      background: #ffebee;
    }
    
    .option-indicator {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid #ccc;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 0.8rem;
      flex-shrink: 0;
    }
    
    .option.selected .option-indicator {
      background: #00d4ff;
      border-color: #00d4ff;
      color: white;
    }
    
    .option.correct .option-indicator {
      background: #4caf50;
      border-color: #4caf50;
      color: white;
      content: "✓";
    }
    
    .option.incorrect .option-indicator {
      background: #f44336;
      border-color: #f44336;
      color: white;
    }

      font-size: 0.95rem;
      resize: vertical;
      margin-bottom: 15px;

    .code-input:focus {
      outline: none;
      border-color: #00d4ff;
    }
    
    .feedback {
      padding: 15px;
      border-radius: 8px;
      margin-top: 20px;
      display: none;
    }
    
    .feedback.show {
      display: block;
      animation: slideIn 0.3s ease;
    }
    
    .feedback.correct {
      background: #e8f5e9;
      border-left: 4px solid #4caf50;
      color: #2e7d32;
    }
    
    .feedback.incorrect {

    }

      border: none;
      border-radius: 25px;
      cursor: pointer;
      font-size: 1rem;
      margin-right: 10px;

      padding: 12px 30px;
      border: none;
      border-radius: 25px;

      font-size: 1rem;

      padding: 40px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border-radius: 12px;
      margin-bottom: 30px;

      font-weight: bold;

    .badge {

      margin: 5px;
      font-size: 0.9rem;

      from { opacity: 0; transform: translateY(-10px); }

    }
    
    .practice-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    
    .tab {
      padding: 10px 20px;
      border: none;
      background: #e0e0e0;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .tab.active {
      background: #ff6b6b;
      color: white;
    }
    
    .difficulty-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 0.8rem;
      font-weight: bold;
      margin-left: 10px;
    }
    
    .difficulty-easy { background: #c8e6c9; color: #2e7d32; }
    .difficulty-medium { background: #fff9c4; color: #f57f17; }
    .difficulty-hard { background: #ffcdd2; color: #c62828; }

      .sidebar { width: 100%; position: relative; height: auto; }

  </style>
</head>

// Datos de contenido educativo
const contentData = {

      <p>Snowflake es una plataforma de datos en la nube revolucionaria que separa completamente el almacenamiento del procesamiento.

      <div class="info-box">
        <strong>💡 Ventaja clave:</strong> A diferencia de las bases de datos tradicionales, Snowflake gestiona automáticamente

      <h3>Características principales:</h3>

        <li>Arquitectura multi-cluster compartida</li>
        <li>Separación de almacenamiento y cómputo</li>
        <li>Soporte nativo para datos semiestructurados (JSON, XML, Avro)</li>
        <li>Time Travel y Fail-safe integrados</li>
        <li>Zero-copy cloning</li>
      </ul>
    `,
    hasPractice: true

  arquitectura: {

X-Small   → 1 nodo   (crédito/hora)

<span class="highlight">CREATE TABLE</span> clientes (

<span class="comment">-- Columnas especiales:</span>

let currentTopic = 'intro';
let currentQuiz = null;
let currentQuestionIndex = 0;
let score = 0;
let userAnswers = [];

function load(topic, element) {
  currentTopic = topic;
  const content = contentData[topic];
  
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  if (element) element.classList.add('active');
  
  let html = `
    <div class="header">
      <span class="tag">${content.tag}</span>
      <h1>${content.title}</h1>
    </div>
    <div class="card">
      ${content.content}
      <div style="margin-top: 30px; padding-top: 20px; border-top: 2px solid #eee;">
        ${content.hasPractice ? `
          <button class="btn-practice" onclick="startQuiz('${topic}')">
            🎯 Practicar este tema
          </button>
        ` : ''}
        <button class="btn-next" onclick="nextTopic()">Siguiente tema →</button>
      </div>
    </div>
  `;
  
  document.getElementById('content-area').innerHTML = html;
  
  // Actualizar progreso
  const topics = Object.keys(contentData);
  const currentIndex = topics.indexOf(topic) + 1;
  document.getElementById('progress').style.width = (currentIndex / topics.length * 100) + '%';
  
  window.scrollTo(0, 0);
}

function startQuiz(topic) {
  currentQuiz = quizData[topic];
  currentQuestionIndex = 0;
  score = 0;
  userAnswers = [];
  
  if (!currentQuiz || currentQuiz.length === 0) {
    alert('Próximamente: Preguntas para este tema');
    return;
  }
  
  showQuestion();
}

function showQuestion() {
  const question = currentQuiz[currentQuestionIndex];
  const progress = ((currentQuestionIndex + 1) / currentQuiz.length * 100).toFixed(0);
  
  let questionHtml = `
    <div class="quiz-container">
      <div class="quiz-header">
        <h2>🎯 Modo Práctica</h2>
        <span class="quiz-progress">Pregunta ${currentQuestionIndex + 1} de ${currentQuiz.length}</span>
      </div>
      
      <div class="progress-bar" style="margin-bottom: 20px;">
        <div class="progress-fill" style="width: ${progress}%; background: linear-gradient(90deg, #ff6b6b, #ff8e8e);"></div>
      </div>
      
      <div class="question">
        ${question.question}
        <span class="difficulty-badge difficulty-${question.difficulty}">
          ${question.difficulty === 'easy' ? 'Fácil' : question.difficulty === 'medium' ? 'Medio' : 'Difícil'}
        </span>
      </div>
  `;
  
  if (question.type === 'multiple') {
    questionHtml += `<div class="options">`;
    question.options.forEach((option, idx) => {
      questionHtml += `
        <div class="option" onclick="selectOption(${idx})" data-idx="${idx}">
          <div class="option-indicator">${String.fromCharCode(65 + idx)}</div>
          <div>${option}</div>
        </div>
      `;
    });
    questionHtml += `</div>`;
  } else if (question.type === 'truefalse') {
    questionHtml += `
      <div class="options">
        <div class="option" onclick="selectOption(true)" data-val="true">
          <div class="option-indicator">V</div>
          <div>Verdadero</div>
        </div>
        <div class="option" onclick="selectOption(false)" data-val="false">
          <div class="option-indicator">F</div>
          <div>Falso</div>
        </div>
      </div>
    `;
  } else if (question.type === 'code') {
    questionHtml += `
      <div style="margin-bottom: 15px;">
        <textarea class="code-input" id="code-answer" placeholder="Escribe tu respuesta SQL aquí...">${question.template || ''}</textarea>
      </div>
    `;
  }
  
  questionHtml += `
      <div style="margin-top: 20px;">
        <button class="btn-check" onclick="checkAnswer()">Verificar respuesta</button>
        <button class="btn-skip" onclick="skipQuestion()">Saltar</button>
      </div>
      
      <div id="feedback" class="feedback">
        <strong id="feedback-title"></strong><br>
        <span id="feedback-text"></span>
      </div>
    </div>
  `;
  
  document.getElementById('content-area').innerHTML = questionHtml;
}

let selectedOption = null;

function selectOption(idx) {
  selectedOption = idx;
  document.querySelectorAll('.option').forEach(el => el.classList.remove('selected'));
  document.querySelector(`[data-idx="${idx}"]`)?.classList.add('selected');
  document.querySelector(`[data-val="${idx}"]`)?.classList.add('selected');
}

function checkAnswer() {
  const question = currentQuiz[currentQuestionIndex];
  let isCorrect = false;
  let userAnswer = null;
  
  if (question.type === 'multiple') {
    if (selectedOption === null) {
      alert('Por favor selecciona una opción');
      return;
    }
    isCorrect = selectedOption === question.correct;
    userAnswer = selectedOption;
  } else if (question.type === 'truefalse') {
    if (selectedOption === null) {
      alert('Por favor selecciona Verdadero o Falso');
      return;
    }
    isCorrect = selectedOption === question.correct;
    userAnswer = selectedOption;
  } else if (question.type === 'code') {
    const codeAnswer = document.getElementById('code-answer').value.trim().toLowerCase();
    userAnswer = codeAnswer;
    isCorrect = question.answer.some(ans => codeAnswer.includes(ans.toLowerCase()));
  }
  
  userAnswers.push({
    question: question.question,
    correct: isCorrect,
    userAnswer: userAnswer
  });
  
  // Mostrar feedback
  const feedback = document.getElementById('feedback');
  const feedbackTitle = document.getElementById('feedback-title');
  const feedbackText = document.getElementById('feedback-text');
  
  feedback.className = 'feedback show ' + (isCorrect ? 'correct' : 'incorrect');
  feedbackTitle.textContent = isCorrect ? '✅ ¡Correcto!' : '❌ Incorrecto';
  feedbackText.textContent = question.explanation;
  
  if (isCorrect) score++;
  
  // Marcar opciones visualmente
  if (question.type === 'multiple' || question.type === 'truefalse') {
    document.querySelectorAll('.option').forEach((el, idx) => {
      const optionIdx = question.type === 'truefalse' ? 
        (el.getAttribute('data-val') === 'true') : 
        parseInt(el.getAttribute('data-idx'));
      
      if (optionIdx === question.correct) {
        el.classList.add('correct');
      } else if (optionIdx === userAnswer && !isCorrect) {
        el.classList.add('incorrect');
      }
    });
  }
  
  // Cambiar botón a "Siguiente"
  const btnCheck = document.querySelector('.btn-check');
  btnCheck.textContent = currentQuestionIndex < currentQuiz.length - 1 ? 'Siguiente pregunta →' : 'Ver resultados';
  btnCheck.onclick = nextQuestion;
  
  // Deshabilitar selección
  document.querySelectorAll('.option').forEach(el => {
    el.style.pointerEvents = 'none';
  });
  if (document.getElementById('code-answer')) {
    document.getElementById('code-answer').readOnly = true;
  }
}

function skipQuestion() {
  userAnswers.push({
    question: currentQuiz[currentQuestionIndex].question,
    correct: false,
    skipped: true
  });
  nextQuestion();
}

function nextQuestion() {
  currentQuestionIndex++;
  selectedOption = null;
  
  if (currentQuestionIndex < currentQuiz.length) {
    showQuestion();
  } else {
    showResults();
  }
}

function showResults() {
  const percentage = Math.round((score / currentQuiz.length) * 100);
  let badge = '';
  let message = '';
  
  if (percentage >= 90) {
    badge = '🏆 Experto Snowflake';
    message = '¡Excelente! Dominas este tema a la perfección.';
  } else if (percentage >= 70) {
    badge = '⭐ Proficiente';
    message = '¡Muy bien! Tienes buenos conocimientos, pero hay margen de mejora.';
  } else if (percentage >= 50) {
    badge = '📚 En progreso';
    message = 'Vas por buen camino. Revisa los conceptos que te faltaron.';
  } else {
    badge = '🔄 Necesitas práctica';
    message = 'Te recomendamos revisar el material teórico nuevamente.';
  }
  
  let wrongAnswersHtml = '';
  const wrongAnswers = userAnswers.filter(a => !a.correct && !a.skipped);
  if (wrongAnswers.length > 0) {
    wrongAnswersHtml = `
      <div style="margin-top: 30px; text-align: left;">
        <h3 style="margin-bottom: 15px;">📋 Revisar errores:</h3>
        ${wrongAnswers.map((ans, idx) => `
          <div style="background: white; padding: 15px; border-radius: 8px; margin-bottom: 10px; border-left: 3px solid #f44336;">
            <strong>${idx + 1}. ${ans.question}</strong>
            <p style="margin-top: 5px; color: #666;">Tu respuesta fue incorrecta. Revisa la explicación en la pregunta anterior.</p>
          </div>
        `).join('')}
      </div>
    `;
  }
  
  const html = `
    <div class="quiz-container">
      <div class="score-display">
        <h2>¡Práctica completada!</h2>
        <div class="score-number">${percentage}%</div>
        <p>Acertaste ${score} de ${currentQuiz.length} preguntas</p>
        <div class="badge">${badge}</div>
      </div>
      
      <div style="text-align: center; margin-bottom: 20px;">
        <p style="font-size: 1.1rem; color: #555;">${message}</p>
      </div>
      
      ${wrongAnswersHtml}
      
      <div style="text-align: center; margin-top: 30px;">
        <button class="btn-practice" onclick="startQuiz('${currentTopic}')">🔄 Reintentar quiz</button>
        <button class="btn-next" onclick="load('${currentTopic}', document.querySelector('.nav-item.active'))">
          ← Volver al contenido
        </button>
      </div>
    </div>
  `;
  
  document.getElementById('content-area').innerHTML = html;
  
  // Guardar progreso en localStorage
  saveProgress(currentTopic, percentage);
}

function saveProgress(topic, score) {
  let progress = JSON.parse(localStorage.getItem('snowflake_progress') || '{}');
  if (!progress[topic] || progress[topic] < score) {
    progress[topic] = score;
    localStorage.setItem('snowflake_progress', JSON.stringify(progress));
  }
}

function startPracticeMode(element) {
  // Modo examen: mezcla preguntas de todos los temas
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  if (element) element.classList.add('active');
  
  // Combinar todas las preguntas
  let allQuestions = [];
  Object.keys(quizData).forEach(topic => {
    quizData[topic].forEach(q => {
      allQuestions.push({...q, topic: topic});
    });
  });
  
  // Mezclar aleatoriamente y tomar 10
  allQuestions = allQuestions.sort(() => 0.5 - Math.random()).slice(0, 10);
  
  currentQuiz = allQuestions;
  currentQuestionIndex = 0;
  score = 0;
  userAnswers = [];
  
  showExamQuestion();
}

      <div style="display: flex; justify-content: space-between; margin: 10px 0; padding: 10px; background: white; border-radius: 8px;">
        <span>${contentData[topic]?.title || topic}</span>
        <span style="color: ${color}; font-weight: bold;">${t.correct}/${t.total} (${pct}%)</span>
      </div>
    `;
  });
  topicHtml += '</div>';
  
  const html = `
    <div class="quiz-container">
      <div class="score-display" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);">
        <h2>🎉 Examen Completado</h2>
        <div class="score-number">${percentage}%</div>
        <p>Acertaste ${score} de ${currentQuiz.length} preguntas</p>
        <div class="badge">${badge}</div>
      </div>
      
      <div style="text-align: center; margin-bottom: 20px;">
        <p style="font-size: 1.1rem; color: #555;">${message}</p>
      </div>
      
      ${topicHtml}
      
      <div style="text-align: center; margin-top: 30px;">
        <button class="btn-practice" onclick="startPracticeMode(document.querySelector('[onclick=\\'startPracticeMode(this)\\']'))" style="background: #667eea;">
          🔄 Nuevo examen
        </button>
        <button class="btn-next" onclick="viewMyProgress(document.querySelector('[onclick=\\'viewMyProgress(this)\\']'))">
          Ver mi progreso
        </button>
      </div>
    </div>
  `;
  
  document.getElementById('content-area').innerHTML = html;
}

function nextTopic() {
  const topics = Object.keys(contentData);
  const currentIndex = topics.indexOf(currentTopic);
  if (currentIndex < topics.length - 1) {
    const nextTopic = topics[currentIndex + 1];
    const nextElement = document.querySelector(`[onclick="load('${nextTopic}', this)"]`);
    load(nextTopic, nextElement);
  }
}

function searchTopics(query) {
  const items = document.querySelectorAll('.nav-item');
  query = query.toLowerCase();
  
  items.forEach(item => {
    const text = item.textContent.toLowerCase();
    item.style.display = text.includes(query) ? 'flex' : 'none';
  });
}

// Cargar tema inicial
load('intro', document.querySelector('.nav-item'));
</script>
